<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tele-Agent - App Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #e2e8f0;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 18px;
            color: #94a3b8;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            margin-bottom: 60px;
            align-items: center;
        }

        .device-wrapper {
            animation: fadeInUp 0.8s ease-out;
        }

        .device-wrapper:nth-child(2) {
            animation-delay: 0.2s;
        }

        /* iPhone Frame */
        .iphone {
            position: relative;
            width: 280px;
            height: 570px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 12px solid #0f172a;
            border-radius: 40px;
            box-shadow: 0 0 60px rgba(15, 23, 42, 0.8), inset 0 0 0 1px rgba(148, 163, 184, 0.1);
            overflow: hidden;
        }

        .iphone::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #0f172a;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            padding-top: 12px;
        }

        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
        }

        .connect-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        .connect-btn:active {
            transform: translateY(0);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 2px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            font-size: 12px;
            text-align: center;
        }

        .message {
            display: flex;
            animation: messageSlideIn 0.4s ease-out;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 10px;
            color: #64748b;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .input-area {
            padding: 12px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            gap: 8px;
        }

        .input-field {
            flex: 1;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            background: rgba(148, 163, 184, 0.15);
            border-color: rgba(14, 165, 233, 0.5);
            box-shadow: 0 0 12px rgba(14, 165, 233, 0.2);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Apple Watch Frame */
        .watch {
            position: relative;
            width: 280px;
            height: 340px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 8px solid #0f172a;
            border-radius: 72px;
            box-shadow: 0 0 60px rgba(15, 23, 42, 0.8), inset 0 0 0 1px rgba(148, 163, 184, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .watch-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            overflow: hidden;
        }

        .watch-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .watch-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .watch-messages::-webkit-scrollbar {
            width: 3px;
        }

        .watch-messages::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
        }

        .watch-message {
            padding: 8px 10px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.3;
            border-left: 2px solid #0ea5e9;
            animation: messageSlideIn 0.4s ease-out;
        }

        .watch-message-text {
            color: #e2e8f0;
            margin-bottom: 2px;
        }

        .watch-message-time {
            font-size: 9px;
            color: #64748b;
        }

        .watch-footer {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .watch-btn {
            flex: 1;
            padding: 8px;
            background: rgba(14, 165, 233, 0.2);
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 6px;
            color: #0ea5e9;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .watch-btn:hover {
            background: rgba(14, 165, 233, 0.3);
        }

        .sync-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            font-size: 24px;
            animation: syncPulse 0.6s ease-out;
        }

        .sync-indicator.active {
            animation: syncPulse 0.6s ease-out forwards;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes syncPulse {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }

        @media (max-width: 1200px) {
            .devices-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .header h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 768px) {
            .devices-grid {
                gap: 30px;
            }

            .iphone, .watch {
                width: 240px;
            }

            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tele-Agent</h1>
            <p>Telegram on your wrist. Instantly.</p>
        </div>

        <div class="devices-grid">
            <!-- iPhone -->
            <div class="device-wrapper">
                <div class="iphone">
                    <div class="iphone-screen">
                        <div class="status-bar">
                            <div class="status-indicator">
                                <span class="status-dot" id="iphoneStatusDot"></span>
                                <span id="iphoneStatusText">Disconnected</span>
                            </div>
                            <button class="connect-btn" id="connectBtn">Connect</button>
                        </div>

                        <div class="messages-container" id="iphoneMessages">
                            <div class="empty-state">
                                <div style="font-size: 32px; margin-bottom: 12px;">📨</div>
                                <div>No messages yet</div>
                            </div>
                        </div>

                        <div class="input-area">
                            <input type="text" class="input-field" id="messageInput" placeholder="Type message...">
                            <button class="send-btn" id="sendBtn">✈️</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Apple Watch -->
            <div class="device-wrapper">
                <div class="watch">
                    <div class="watch-screen">
                        <div class="watch-header">TELEGRAM BRIDGE</div>

                        <div class="watch-messages" id="watchMessages">
                            <div style="text-align: center; color: #64748b; font-size: 11px; padding-top: 20px;">No messages</div>
                        </div>

                        <div class="watch-footer">
                            <button class="watch-btn" id="watchReplyBtn">↩️ Reply</button>
                            <button class="watch-btn" id="watchConnectBtn">✓ Connect</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const iphoneMessages = document.getElementById('iphoneMessages');
        const watchMessages = document.getElementById('watchMessages');
        const iphoneStatusDot = document.getElementById('iphoneStatusDot');
        const iphoneStatusText = document.getElementById('iphoneStatusText');
        const watchConnectBtn = document.getElementById('watchConnectBtn');
        const watchReplyBtn = document.getElementById('watchReplyBtn');

        let isConnected = false;
        let messageCount = 0;

        function updateConnectionStatus() {
            if (isConnected) {
                iphoneStatusDot.classList.add('connected');
                iphoneStatusText.textContent = 'Connected';
                connectBtn.textContent = 'Disconnect';
                watchConnectBtn.textContent = '✓ Connected';
                watchConnectBtn.style.background = 'rgba(16, 185, 129, 0.2)';
                watchConnectBtn.style.borderColor = 'rgba(16, 185, 129, 0.4)';
                watchConnectBtn.style.color = '#10b981';
            } else {
                iphoneStatusDot.classList.remove('connected');
                iphoneStatusText.textContent = 'Disconnected';
                connectBtn.textContent = 'Connect';
                watchConnectBtn.textContent = '🔴 Offline';
                watchConnectBtn.style.background = 'rgba(239, 68, 68, 0.2)';
                watchConnectBtn.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                watchConnectBtn.style.color = '#ef4444';
            }
        }

        function showEmptyState() {
            if (messageCount === 0) {
                iphoneMessages.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 32px; margin-bottom: 12px;">📨</div>
                        <div>No messages yet</div>
                    </div>
                `;
                watchMessages.innerHTML = `
                    <div style="text-align: center; color: #64748b; font-size: 11px; padding-top: 20px;">No messages</div>
                `;
            }
        }

        function addMessage(text, sent = true) {
            if (messageCount === 0) {
                iphoneMessages.innerHTML = '';
                watchMessages.innerHTML = '';
            }

            messageCount++;

            // Add to iPhone
            const messageEl = document.createElement('div');
            messageEl.className = `message ${sent ? 'sent' : 'received'}`;
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            messageEl.innerHTML = `
                <div>
                    <div class="message-bubble">${text}</div>
                    <div class="timestamp">${time}</div>
                </div>
            `;
            iphoneMessages.appendChild(messageEl);
            iphoneMessages.scrollTop = iphoneMessages.scrollHeight;

            // Add to Watch with sync animation
            const watchMsg = document.createElement('div');
            watchMsg.className = 'watch-message';
            watchMsg.innerHTML = `
                <div class="watch-message-text">"${text.substring(0, 30)}${text.length > 30 ? '...' : ''}"</div>
                <div class="watch-message-time">${time}</div>
            `;
            watchMessages.appendChild(watchMsg);
            watchMessages.scrollTop = watchMessages.scrollHeight;

            // Simulate sync indicator
            const syncEl = document.createElement('div');
            syncEl.className = 'sync-indicator active';
            syncEl.textContent = '🔄';
            document.body.appendChild(syncEl);
            setTimeout(() => syncEl.remove(), 600);
        }

        connectBtn.addEventListener('click', () => {
            if (!isConnected && messageCount === 0) {
                isConnected = true;
                updateConnectionStatus();
                // Show sample message
                setTimeout(() => {
                    addMessage('Hey! I\'m using Tele-Agent!', true);
                }, 400);
            } else if (isConnected) {
                isConnected = false;
                updateConnectionStatus();
            }
        });

        watchConnectBtn.addEventListener('click', () => {
            connectBtn.click();
        });

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text && isConnected) {
                addMessage(text, true);
                messageInput.value = '';

                // Simulate response
                setTimeout(() => {
                    const responses = [
                        'Message received! 📱',
                        'Got it! ✨',
                        'Perfect sync! 🚀',
                        'Watch synced! ⌚'
                    ];
                    const response = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(response, false);
                }, 600);
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        watchReplyBtn.addEventListener('click', () => {
            if (isConnected) {
                const replies = [
                    'Looks great! 👍',
                    'Thanks! 🙌',
                    'Perfect! ✨',
                    'All set! 🎉'
                ];
                const reply = replies[Math.floor(Math.random() * replies.length)];
                addMessage(reply, true);
                setTimeout(() => {
                    addMessage('Received on iPhone! 📲', false);
                }, 600);
            }
        });

        updateConnectionStatus();
    </script>
</body>
</html>
